name: s1_snappy

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # core
  - pip
  - numpy
  - scipy

  # geospatial (RTC 출력물 후처리 / 수체 탐지용)
  - gdal
  - rasterio

  # utilities
  - tqdm
  - rich

  - pip:
      - esa-snappy

# ------------------------------------------------------------------
# 이 환경만으로는 실행이 안 됩니다. esa_snappy는 ESA SNAP Desktop 앱과
# Java-Python bridge(jpy)로 연결되어야 동작하는 패키지라, SNAP Desktop을
# 별도로 설치한 뒤 아래 두 단계를 한 번 더 거쳐야 합니다.
#
#   1) SNAP Desktop 설치 (https://step.esa.int/main/download/snap-download/)
#   2) 이 conda 환경을 활성화한 상태에서, SNAP 설치 폴더의 bin에서:
#        snappy-conf $(conda run -n s1_snappy which python)
#
# 위 두 단계 전까지는 `import esa_snappy`가 실패합니다 (환경 설치만으로는
# 안 됨). 자세한 내용은 esa-snappy-master/의 설치 문서를 참고하세요.
# ------------------------------------------------------------------
